<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Number Lane Invite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph for link previews -->
  <meta property="og:title" content="Join my Number Lane Game!" />
  <meta property="og:description" content="Tap to join my multiplayer lobby in Number Lane. Let's play!" />
  <meta property="og:image" content="https://skpawar1305.github.io/number_lane_invite/number_lane_preview.jpg" />
  <meta property="og:url" content="https://skpawar1305.github.io/number_lane_invite" />
  <meta name="twitter:card" content="summary_large_image" />
</head>
<body style="background-color: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh;">
  <p>Opening Number Lane...</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const room = params.get("room");

    if (room) {
      // Try to open your app via intent scheme (Android)
      window.location.href = `intent://invite?room=${room}#Intent;scheme=https;package=com.dano.number_lane;end`;
    } else {
      window.location.href = "https://play.google.com/store/apps/details?id=com.dano.number_lane";
    }
  </script>
</body>
</html>
