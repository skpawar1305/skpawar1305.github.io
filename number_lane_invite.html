<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Number Lane Invite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Meta for social preview -->
  <meta property="og:title" content="Join my Number Lane Game!" />
  <meta property="og:description" content="Tap to join my multiplayer lobby in Number Lane. Let's play!" />
  <meta property="og:image" content="https://skpawar1305.github.io/number_lane_invite/preview.png" />
  <meta property="og:url" content="https://skpawar1305.github.io/number_lane_invite" />
  <meta name="twitter:card" content="summary_large_image" />
</head>
<body style="background-color: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">
  <p>Opening Number Lane...</p>
  <a id="fallbackLink" style="color: #0af; display: none; margin-top: 20px;" href="https://play.google.com/store/apps/details?id=com.dano.number_lane">
    Didn't work? Tap here to open in Play Store.
  </a>

  <script>
    const params = new URLSearchParams(window.location.search);
    const room = params.get("room");

    if (room) {
      const intentLink = `intent://invite?room=${room}#Intent;scheme=https;package=com.dano.number_lane;end`;

      setTimeout(() => {
        window.location.href = intentLink;
      }, 100); // Short delay to let the page load

      // Show fallback if nothing happens in 3 seconds
      setTimeout(() => {
        document.getElementById('fallbackLink').style.display = 'block';
      }, 3000);
    } else {
      window.location.href = "https://play.google.com/store/apps/details?id=com.dano.number_lane";
    }
  </script>
</body>
</html>
